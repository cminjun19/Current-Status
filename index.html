<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Status</title>

<style>

body{
    margin:0;
    background:#eee;
    font-family:sans-serif;
}

header{
    height:100px;
    background:black;
    color:white;

    display:flex;
    align-items:center;
    justify-content:center;

    position:relative;
}

.login{
    position:absolute;
    right:30px;
}

.container{
    display:flex;
    justify-content:space-around;
    padding:40px;
}

.left{
    text-align:center;
}

.profile{
    width:500px;
    height:500px;
    border-radius:50%;
    background:#222;
}

.status{
    margin-top:30px;

    border:4px solid black;
    border-radius:20px;

    padding:20px;

    font-size:50px;
    font-weight:bold;
}

.right{
    width:500px;
}

.time{
    background:black;
    color:white;

    text-align:center;

    padding:25px;

    border-radius:30px;

    font-size:40px;
    font-weight:bold;
}

.card{

    margin-top:30px;

    border:4px solid black;
    border-radius:25px;

    height:300px;

    text-align:center;
}

</style>
</head>
<body>

<header>

<h1>현재 상태</h1>

<div class="login">
로그인
</div>

</header>

<div class="container">

<div class="left">

<div class="profile"></div>

<div class="status">
취침 중
</div>

</div>

<div class="right">

<div class="time">
현재 시간
</div>

<div class="card">
문자
</div>

<div class="card">
전화
</div>

</div>

</div>

</body>
</html>
