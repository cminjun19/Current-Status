<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Status</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#eeeeee;
    font-family:"Malgun Gothic", sans-serif;
    height:100vh;
    overflow:hidden;
}

/* 헤더 */

header{
    height:80px;
    background:black;
    color:white;

    display:flex;
    align-items:center;
    justify-content:center;

    position:relative;
}

.title{
    position:absolute;
    left:30px;

    font-size:32px;
    font-weight:bold;
}

.login{
    position:absolute;
    right:30px;

    font-size:24px;
    font-weight:bold;

    cursor:pointer;
}

/* 현재 시간 */

.time-box{

    width:220px;

    margin:10px auto 15px auto;

    background:white;

    border:3px solid black;
    border-radius:16px;

    padding:8px 15px;

    text-align:center;

    box-shadow:0 3px 10px rgba(0,0,0,0.12);
}

.time-label{

    font-size:13px;
    font-weight:700;

    color:#666;

    margin-bottom:2px;
}

#time{

    font-size:26px;
    font-weight:900;

    letter-spacing:1px;

    color:#111;
}

/* 본문 */

.container{

    height:calc(100vh - 140px);

    display:flex;

    justify-content:space-evenly;
    align-items:center;
}

/* 왼쪽 */

.left{

    display:flex;
    flex-direction:column;

    align-items:center;
}

.profile{

    width:min(38vw,500px);
    height:min(38vw,500px);

    border-radius:50%;

    border:6px solid black;

    object-fit:cover;

    background:white;

    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.status{

    margin-top:25px;

    background:white;

    border:4px solid black;
    border-radius:25px;

    padding:18px 40px;

    font-size:48px;
    font-weight:bold;

    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* 오른쪽 */

.right{

    width:min(32vw,500px);

    display:flex;
    flex-direction:column;

    gap:25px;
}

.card{

    height:230px;

    background:white;

    border:4px solid black;
    border-radius:25px;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.card-title{

    font-size:42px;
    font-weight:bold;

    margin-bottom:15px;
}

.card-status{

    font-size:90px;
    font-weight:bold;
}

</style>
</head>
<body>

<header>

    <div class="title">
        현재 상태
    </div>

    <div class="login">
        로그인
    </div>

</header>

<div class="time-box">

    <div class="time-label">
        현재 시간
    </div>

    <div id="time">
        로딩 중...
    </div>

</div>

<div class="container">

    <div class="left">

        <img
            id="statusImage"
            class="profile"
            src="images/sleeping.png"
            alt="현재 상태">

        <div
            class="status"
            id="statusText">

            취침 중

        </div>

    </div>

    <div class="right">

        <div class="card">

            <div class="card-title">
                문자
            </div>

            <div class="card-status">
                O
            </div>

        </div>

        <div class="card">

            <div class="card-title">
                전화
            </div>

            <div class="card-status">
                X
            </div>

        </div>

    </div>

</div>

<script>

function updateTime(){

    const now = new Date();

    const timeString =
        now.toLocaleTimeString(
            "ko-KR",
            {
                hour: "2-digit",
                minute: "2-digit",
                hour12: false
            }
        );

    document.getElementById("time").textContent =
        timeString;
}

updateTime();
setInterval(updateTime,1000);

</script>

</body>
</html>
