<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Status</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#eeeeee;
    font-family:"Malgun Gothic",sans-serif;
    min-height:100vh;
}

header{
    height:70px;
    background:#111827;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 30px;
}

.title{
    color:white;
    font-size:28px;
    font-weight:800;
}

#authButtons{
    display:flex;
    gap:10px;
}

.login-btn{
    color:white;
    border:2px solid white;
    border-radius:10px;
    padding:6px 14px;
    cursor:pointer;
    font-weight:bold;
}

.time-box{
    width:220px;
    margin:15px auto;
    background:white;
    border:3px solid black;
    border-radius:15px;
    text-align:center;
    padding:10px;
}

#time{
    font-size:26px;
    font-weight:900;
}

.container{
    display:flex;
    justify-content:center;
    gap:120px;
    padding-top:20px;
}

.left{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.profile{
    width:350px;
    height:350px;

    border-radius:50%;
    border:6px solid black;

    object-fit:cover;
}

.status{
    margin-top:25px;

    background:white;

    border:5px solid black;
    border-radius:22px;

    width:500px;
    height:110px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:34px;
    font-weight:900;

    text-align:center;
}

.right{
    width:500px;

    display:flex;
    flex-direction:column;

    gap:35px;
}

.card{
    background:white;

    border:5px solid black;
    border-radius:28px;

    width:480px;
    height:310px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.card-title{
    font-size:32px;
    font-weight:900;
    margin-bottom:15px;
}

.card-status{
    font-size:120px;
    font-weight:900;
    line-height:1;
}
</style>
</head>
<body>

<header>

    <div class="title">
        현재 상태
    </div>

    <div id="authButtons">

        <div
            class="login-btn"
            onclick="goLogin()">

            로그인

        </div>

    </div>

</header>

<div class="time-box">

    <div>현재 시간</div>

    <div id="time">
        로딩 중...
    </div>

</div>

<div class="container">

    <div class="left">

        <img
            class="profile"
            id="statusImage"
            src="images/sleeping.png">

        <div
            class="status"
            id="statusText">

            취침 중

        </div>

    </div>

    <div class="right">

        <div class="card">

            <div class="card-title">
                문자
            </div>

            <div
                class="card-status"
                id="messageStatus">

                O

            </div>

        </div>

        <div class="card">

            <div class="card-title">
                전화
            </div>

            <div
                class="card-status"
                id="phoneStatus">

                X

            </div>

        </div>

    </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "current-status-906b8.firebaseapp.com",
    projectId: "current-status-906b8",
    storageBucket: "current-status-906b8.firebasestorage.app",
    messagingSenderId: "8606166095",
    appId: "1:8606166095:web:a63476910c6c72320e0e3a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function updateTime(){

    const now = new Date();

    document.getElementById("time").textContent =
    now.toLocaleTimeString(
        "ko-KR",
        {
            hour:"2-digit",
            minute:"2-digit",
            hour12:false
        }
    );
}

updateTime();
setInterval(updateTime,1000);

window.goLogin = function(){
    location.href = "login.html";
}

window.goMyPage = function(){
    alert("마이페이지 준비중");
}

window.logout = async function(){
    await signOut(auth);
    location.reload();
}

onAuthStateChanged(auth,(user)=>{

    if(user){

        document.getElementById("authButtons").innerHTML = `

            <div
                class="login-btn"
                onclick="logout()">

                로그아웃

            </div>

            <div
                class="login-btn"
                onclick="goMyPage()">

                마이페이지

            </div>

        `;
    }
    else{

        document.getElementById("authButtons").innerHTML = `

            <div
                class="login-btn"
                onclick="goLogin()">

                로그인

            </div>

        `;
    }

});

</script>

</body>
</html>
