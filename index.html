<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Status</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#eeeeee;
    font-family:"Malgun Gothic",sans-serif;
    min-height:100vh;
}

header{
    height:70px;
    background:#111827;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 30px;
}

.title{
    color:white;
    font-size:28px;
    font-weight:800;
}

#authButtons{
    display:flex;
    gap:10px;
}

.login-btn{
    color:white;
    border:2px solid white;
    border-radius:10px;
    padding:6px 14px;
    cursor:pointer;
    font-weight:bold;
}

.time-box{
    width:220px;
    margin:15px auto;
    background:white;
    border:3px solid black;
    border-radius:15px;
    text-align:center;
    padding:10px;
}

#time{
    font-size:26px;
    font-weight:900;
}

.container{
    display:flex;
    justify-content:center;
    gap:120px;
    padding-top:20px;
}

.status-menu{
    position:absolute;
    left:30px;
    top:180px;

    display:flex;
    flex-direction:column;
    gap:10px;
}

.status-menu button{
    width:170px;
    height:45px;

    border:3px solid black;
    border-radius:12px;

    background:white;

    font-size:18px;
    font-weight:bold;

    cursor:pointer;
}

#saveButton{
    background:#111827;
    color:white;
}

.left{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.profile{
    width:350px;
    height:350px;

    border-radius:50%;
    border:6px solid black;

    object-fit:cover;
}

.status{
    margin-top:20px;

    background:white;

    border:4px solid black;
    border-radius:25px;

    padding:15px 35px;

    font-size:36px;
    font-weight:bold;
}

.right{
    width:420px;

    display:flex;
    flex-direction:column;

    gap:20px;
}

.card{
    background:white;

    border:4px solid black;
    border-radius:25px;

    min-height:180px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.card-title{
    font-size:34px;
    font-weight:bold;
}

.card-status{
    font-size:70px;
    font-weight:bold;
}

.message-wrapper{
    display:flex;
    gap:10px;
}

.message-card{
    width:350px;
}

.message-buttons{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.message-buttons button{
    width:50px;
    height:40px;

    border:3px solid black;
    border-radius:10px;

    background:white;

    cursor:pointer;
}

</style>
</head>
<body>

<header>

    <div class="title">
        현재 상태
    </div>

    <div id="authButtons">

        <div
            class="login-btn"
            onclick="goLogin()">

            로그인

        </div>

    </div>

</header>

<div class="time-box">

    <div>현재 시간</div>

    <div id="time">
        로딩 중...
    </div>

</div>

<div class="status-menu">

    <button onclick="changeStatus('취침')">취침</button>
    <button onclick="changeStatus('컴퓨터')">컴퓨터</button>
    <button onclick="changeStatus('폰')">폰</button>
    <button onclick="changeStatus('볼일')">볼일</button>
    <button onclick="changeStatus('공부')">공부</button>
    <button onclick="changeStatus('학교')">학교</button>

    <button id="saveButton">
        저장
    </button>

</div>

<div class="container">

    <div class="left">

        <img
            class="profile"
            id="statusImage"
            src="images/sleeping.png">

        <div
            class="status"
            id="statusText">

            취침 중

        </div>

    </div>
        <div class="right">

        <div class="message-wrapper">

            <div class="card message-card">

                <div class="card-title">
                    문자
                </div>

                <div
                    class="card-status"
                    id="messageStatus">

                    O

                </div>

            </div>

            <div class="message-buttons">

                <button onclick="setMessageStatus('O')">
                    O
                </button>

                <button onclick="setMessageStatus('X')">
                    X
                </button>

            </div>

        </div>

        <div class="card">

            <div class="card-title">
                전화
            </div>

            <div
                class="card-status"
                id="phoneStatus">

                X

            </div>

        </div>

    </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBdbjHChZ4FWpzxfoUUwZKrPhMj_oYcJGc",
    authDomain: "current-status-906b8.firebaseapp.com",
    projectId: "current-status-906b8",
    storageBucket: "current-status-906b8.firebasestorage.app",
    messagingSenderId: "8606166095",
    appId: "1:8606166095:web:a63476910c6c72320e0e3a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function updateTime(){

    const now = new Date();

    document.getElementById("time").textContent =
    now.toLocaleTimeString(
        "ko-KR",
        {
            hour:"2-digit",
            minute:"2-digit",
            hour12:false
        }
    );
}

updateTime();
setInterval(updateTime,1000);

window.changeStatus = function(status){

    document
    .getElementById("statusText")
    .textContent =
    status + " 중";
}

window.setMessageStatus = function(value){

    document
    .getElementById("messageStatus")
    .textContent =
    value;
}

window.goLogin = function(){

    window.location.href =
    "login.html";
}

window.goMyPage = function(){

    alert(
        "마이페이지 준비중"
    );
}

window.logout = async function(){

    await signOut(auth);

    location.reload();
}

onAuthStateChanged(auth,(user)=>{

    if(user){

        document
        .getElementById("authButtons")
        .innerHTML = `

            <div
                class="login-btn"
                onclick="logout()">

                로그아웃

            </div>

            <div
                class="login-btn"
                onclick="goMyPage()">

                마이페이지

            </div>

        `;
    }

    else{

        document
        .getElementById("authButtons")
        .innerHTML = `

            <div
                class="login-btn"
                onclick="goLogin()">

                로그인

            </div>

        `;
    }

});

</script>

</body>
</html>
