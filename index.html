<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Status</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#eeeeee;
    font-family:"Malgun Gothic", sans-serif;
    height:100vh;
    overflow:hidden;
}

header{
    height:70px;
    background:#111827;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 30px;
}

.title{
    font-size:28px;
    font-weight:800;
    color:white;
}

.login{
    font-size:18px;
    font-weight:600;
    color:white;

    padding:6px 14px;

    border:2px solid white;
    border-radius:10px;

    cursor:pointer;
}

.time-box{

    width:220px;

    margin:10px auto 15px auto;

    background:white;

    border:3px solid black;
    border-radius:16px;

    padding:8px 15px;

    text-align:center;
}

.time-label{

    font-size:13px;
    font-weight:700;

    color:#666;

    margin-bottom:2px;
}

#time{

    font-size:26px;
    font-weight:900;

    letter-spacing:1px;

    color:#111;
}

.container{

    height:calc(100vh - 140px);

    display:flex;

    justify-content:space-evenly;
    align-items:center;
}

.left{
    display:flex;
    flex-direction:column;
    align-items:center;
}

#statusSelect{

    margin-bottom:20px;

    padding:10px 15px;

    font-size:20px;

    border:3px solid black;
    border-radius:12px;

    background:white;
}

.profile{

    width:min(38vw,500px);
    height:min(38vw,500px);

    border-radius:50%;

    border:6px solid black;

    object-fit:cover;

    background:white;
}

.status{

    margin-top:25px;

    background:white;

    border:4px solid black;
    border-radius:25px;

    padding:18px 40px;

    font-size:48px;
    font-weight:bold;
}

.right{

    width:min(32vw,500px);

    display:flex;
    flex-direction:column;

    gap:25px;
}

.card{

    height:230px;

    background:white;

    border:4px solid black;
    border-radius:25px;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;
}

.card-title{

    font-size:42px;
    font-weight:bold;

    margin-bottom:15px;
}

.card-status{

    font-size:90px;
    font-weight:bold;
}

</style>
</head>
<body>

<header>

    <div class="title">
        현재 상태
    </div>

    <div class="login">
        로그인
    </div>

</header>

<div class="time-box">

    <div class="time-label">
        현재 시간
    </div>

    <div id="time">
        로딩 중...
    </div>

</div>

<div class="container">

    <div class="left">

        <select id="statusSelect">

            <option value="취침">취침</option>
            <option value="컴퓨터 하는">컴퓨터 하는</option>
            <option value="폰 하는">폰 하는</option>
            <option value="볼일 보는">볼일 보는</option>
            <option value="공부하는">공부하는</option>
            <option value="학교 정규 수업">학교 정규 수업</option>

        </select>

        <img
            id="statusImage"
            class="profile"
            src="images/sleeping.png"
            alt="현재 상태">

        <div class="status" id="statusText">
            취침 중
        </div>

    </div>

    <div class="right">

        <div class="card">

            <div class="card-title">문자</div>
            <div class="card-status">O</div>

        </div>

        <div class="card">

            <div class="card-title">전화</div>
            <div class="card-status">X</div>

        </div>

    </div>

</div>

<script>

function updateTime(){

    const now = new Date();

    const timeString = now.toLocaleTimeString(
        "ko-KR",
        {
            hour: "2-digit",
            minute: "2-digit",
            hour12: false
        }
    );

    document.getElementById("time").textContent = timeString;
}

updateTime();
setInterval(updateTime,1000);

const statusSelect =
    document.getElementById("statusSelect");

const statusText =
    document.getElementById("statusText");

statusSelect.addEventListener("change", () => {

    statusText.textContent =
        statusSelect.value + " 중";

});

</script>

</body>
</html>
