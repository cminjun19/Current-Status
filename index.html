<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Status</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#eee;
    font-family:sans-serif;
    height:100vh;
    overflow:hidden;
}

header{
    height:10vh;
    min-height:80px;
    background:black;
    color:white;

    display:flex;
    align-items:center;
    justify-content:center;

    position:relative;
}

header h1{
    margin:0;
}

.login{
    position:absolute;
    right:30px;
    font-size:24px;
    cursor:pointer;
}

.container{
    height:90vh;

    display:flex;
    justify-content:space-evenly;
    align-items:center;

    padding:20px 40px;
}

.left{
    text-align:center;
}

.profile{
    width:min(40vw,45vh);
    height:min(40vw,45vh);

    border-radius:50%;
    background:#222;
}

.status{
    margin-top:20px;

    border:4px solid black;
    border-radius:20px;

    padding:15px;

    font-size:clamp(24px,3vw,50px);
    font-weight:bold;
}

.right{
    width:min(35vw,500px);

    display:flex;
    flex-direction:column;
    gap:20px;
}

.time{
    background:black;
    color:white;

    text-align:center;

    padding:20px;

    border-radius:25px;

    font-size:clamp(24px,2vw,40px);
    font-weight:bold;
}

.card{
    border:4px solid black;
    border-radius:25px;

    flex:1;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:40px;
    font-weight:bold;

    background:white;
}

</style>
</head>
<body>

<header>

<h1>현재 상태</h1>

<div class="login">
로그인
</div>

</header>

<div class="container">

    <div class="left">

        <div class="profile"></div>

        <div class="status">
            취침 중
        </div>

    </div>

    <div class="right">

        <div class="time">
            현재 시간
        </div>

        <div class="card">
            문자
        </div>

        <div class="card">
            전화
        </div>

    </div>

</div>

</body>
</html>
