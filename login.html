<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Status - 로그인</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#eeeeee;
    font-family:"Malgun Gothic",sans-serif;
    min-height:100vh;
}

header{
    height:70px;
    background:#111827;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 30px;
}

.title{
    font-size:28px;
    font-weight:800;
    color:white;
}

.login{
    font-size:18px;
    font-weight:600;
    color:white;

    padding:6px 14px;

    border:2px solid white;
    border-radius:10px;

    cursor:pointer;
}

.login-container{
    display:flex;
    justify-content:center;
    align-items:center;

    padding-top:100px;
}

.login-card{

    width:450px;

    background:white;

    border:4px solid black;

    border-radius:25px;

    padding:35px;

    display:flex;
    flex-direction:column;

    gap:15px;
}

.login-card h1{

    text-align:center;

    font-size:36px;

    margin-bottom:10px;
}

.login-card input{

    width:100%;

    height:55px;

    border:3px solid black;

    border-radius:12px;

    padding:0 15px;

    font-size:18px;
}

.login-btn{

    height:55px;

    border:none;

    border-radius:12px;

    background:#111827;

    color:white;

    font-size:20px;

    font-weight:bold;

    cursor:pointer;
}

#error{

    text-align:center;

    color:red;

    font-weight:bold;

    min-height:24px;
}

</style>
</head>
<body>

<header>

    <div class="title">
        현재 상태
    </div>

    <div
        class="login"
        onclick="window.location.href='index.html'">

        홈

    </div>

</header>

<div class="login-container">

    <div class="login-card">

        <h1>관리자 로그인</h1>

        <input
            type="email"
            id="email"
            placeholder="이메일">

        <input
            type="password"
            id="password"
            placeholder="비밀번호">

        <button
            class="login-btn"
            id="loginBtn">

            로그인

        </button>

        <div id="error"></div>

    </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
    getAuth,
    signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBdbjHChZ4FWpzxfoUUwZKrPhMj_oYcJGc",
    authDomain: "current-status-906b8.firebaseapp.com",
    projectId: "current-status-906b8",
    storageBucket: "current-status-906b8.firebasestorage.app",
    messagingSenderId: "8606166095",
    appId: "1:8606166095:web:a63476910c6c72320e0e3a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document
.getElementById("loginBtn")
.onclick = async ()=>{

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    try{

        await signInWithEmailAndPassword(
            auth,
            email,
            password
        );

        alert("로그인 성공");

        window.location.href =
        "index.html";

    }

    catch(error){

        document
        .getElementById("error")
        .textContent =
        "이메일 또는 비밀번호가 올바르지 않습니다.";

        console.error(error);

    }

};

</script>

</body>
</html>
